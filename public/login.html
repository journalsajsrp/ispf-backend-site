<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | المؤسسة الدولية للنشر العلمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #1e293b; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-family: 'Cairo', sans-serif; resize: vertical; }
        button { width: 100%; padding: 12px; background: #0284c7; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-family: 'Cairo', sans-serif; transition: background 0.3s; }
        button:hover { background: #0369a1; }
        a { display: block; margin-top: 15px; color: #64748b; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>لوحة التحكم وتحديث الإعلان</h2>
        <form id="controlForm">
            <textarea id="announcementText" placeholder="اكتب نص الإعلان اليومي الجديد هنا..." rows="3" required></textarea>
            
            <input type="password" id="controlPassword" placeholder="كلمة المرور الأمنية لوحة التحكم" required>
            
            <button type="button" onclick="submitData()">تحديث ونشر الإعلان فوراً</button>
        </form>
        <a href="/">العودة للرئيسية</a>
    </div>

    <script>
        async function submitData() {
            const newText = document.getElementById('announcementText').value.trim();
            const password = document.getElementById('controlPassword').value;

            if (!newText || !password) {
                alert("⚠️ يرجى ملء كافة الحقول أولاً!");
                return;
            }

            // محاكاة بدء عملية الربط
            const btn = document.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "⏳ جاري الاتصال بالسيرفر السحابي...";
            btn.disabled = true;

            try {
                const response = await fetch('/api/update-announcement', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        newText: newText, 
                        password: password 
                    })
                });

                if (response.ok) {
                    const message = await response.text();
                    alert("✅ " + message);
                    // تنظيف الحقول بعد النجاح
                    document.getElementById('controlPassword').value = '';
                } else {
                    alert("❌ كلمة المرور غير صحيحة أو غير مصرح لك بالتعديل!");
                }
            } catch (error) {
                console.error("Error updating announcement:", error);
                alert("❌ فشل الاتصال بقاعدة البيانات. تأكد من تفعيل 0.0.0.0/0 في MongoDB Atlas وربط السيرفر بنجاح.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
